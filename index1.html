<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliva Equestrian Landing Page</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts Match (Serif architectural font + Clean tracking font) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
        }
        .serif-title {
            font-family: 'Cinzel', serif;
            letter-spacing: -0.01em;
        }
    </style>
</head>
<body class="bg-[#FAF9F5] min-h-screen flex flex-col text-[#004D31] overflow-x-hidden">

    <!-- 1. Header -->
    <header class="w-full max-w-7xl mx-auto px-8 py-6 flex justify-between items-center bg-transparent">
        
      <!-- Logo Clone -->
      <div class="flex items-center space-x-4 select-none">
          <!-- Exact Cross Emblem Representation (SVG Perfect Geometry) -->
          <svg class="w-10 h-10 flex-shrink-0" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
              <!-- Main Large Central Cross -->
              <path d="M10 50 H90" stroke="#004D31" stroke-width="4.5" stroke-linecap="square"/>
              <path d="M50 10 V90" stroke="#004D31" stroke-width="4.5" stroke-linecap="square"/>
              
              <!-- Top Vertical Accent Lines -->
              <path d="M35 15 V40" stroke="#004D31" stroke-width="4" stroke-linecap="square"/>
              <path d="M65 15 V40" stroke="#004D31" stroke-width="4" stroke-linecap="square"/>
              
              <!-- Bottom Vertical Accent Lines -->
              <path d="M35 60 V85" stroke="#004D31" stroke-width="4" stroke-linecap="square"/>
              <path d="M65 60 V85" stroke="#004D31" stroke-width="4" stroke-linecap="square"/>
              
              <!-- Left Horizontal Accent Line -->
              <path d="M18 35 H32" stroke="#004D31" stroke-width="3.5" stroke-linecap="square"/>
              
              <!-- Right Horizontal Accent Line -->
              <path d="M68 35 H82" stroke="#004D31" stroke-width="3.5" stroke-linecap="square"/>
          </svg>
          
          <!-- Logo Text Geometry -->
          <div class="flex flex-col justify-center -space-y-2">
              <span class="serif-title text-3xl font-medium tracking-[0.12em] text-[#004D31] leading-none mb-1">OLIVA</span>
              <span class="serif-title text-[9px] tracking-[0.26em] font-normal uppercase text-[#004D31] pl-[2px] opacity-90">EQUESTRIAN</span>
          </div>
      </div>

      <!-- Right Side Nav -->
      <nav class="hidden md:flex items-center space-x-10 text-[11px] font-medium tracking-[0.25em] text-[#004D31]">
          <a href="index.html" class="hover:opacity-60 transition-all duration-200">HOME</a>
          <a href="index1.html" class="hover:opacity-60 transition-all duration-200">PROGRAMS</a>
          <a href="page5.html" class="hover:opacity-60 transition-all duration-200">VENUES</a>
          <a href="#" class="hover:opacity-60 transition-all duration-200">CONTACT</a>
      </nav>
  </header>

    <!-- 2. Main Section Content Area -->
    <section class="w-full max-w-5xl mx-auto px-0 pt-2 pb-12 md:pt-4 md:pb-16 text-center flex-grow flex flex-col justify-center">    
        <div class="mb-14">
          <h1 class="serif-title text-3xl md:text-4xl text-[#004D31] mb-3 tracking-wide">
            Choose Your Path
          </h1>
          <p class="text-sm md:text-base text-gray-500 font-light tracking-wide">
            Two disciplines. One excellence.
          </p>
        </div>
    
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-4xl mx-auto w-full">
          
          <!-- Show Jumping Card -->
          <a href="page1.html" class="group block bg-white border border-gray-100 shadow-sm overflow-hidden text-left transition-all duration-300 hover:shadow-md">
            <div class="aspect-[4/3] overflow-hidden bg-gray-200">
              <img 
                src="img2.png" 
                alt="Horse and rider mid-air during a show jumping event" 
                class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
              />
            </div>
            <div class="p-8 flex justify-between items-center bg-white">
              <div>
                <h3 class="text-sm font-bold uppercase tracking-widest text-gray-900 mb-1">
                  Show Jumping
                </h3>
                <p class="text-sm text-gray-500 font-light">
                  Elevate your jump.
                </p>
              </div>
              <div class="w-8 h-8 rounded-full border border-gray-200 flex items-center justify-center text-gray-400 group-hover:border-[#004D31] group-hover:text-[#004D31] transition-colors duration-300">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
                </svg>
              </div>
            </div>
          </a>
    
          <!-- Dressage Card -->
          <a href="#" class="group block bg-white border border-gray-100 shadow-sm overflow-hidden text-left transition-all duration-300 hover:shadow-md">
            <div class="aspect-[4/3] overflow-hidden bg-gray-200">
              <img 
                src="img3.png" 
                alt="Close up on a horse's legs performing dressage movements" 
                class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
              />
            </div>
            <div class="p-8 flex justify-between items-center bg-white">
              <div>
                <h3 class="text-sm font-bold uppercase tracking-widest text-gray-900 mb-1">
                  Dressage
                </h3>
                <p class="text-sm text-gray-500 font-light">
                  Perfect your harmony.
                </p>
              </div>
              <div class="w-8 h-8 rounded-full border border-gray-200 flex items-center justify-center text-gray-400 group-hover:border-[#004D31] group-hover:text-[#004D31] transition-colors duration-300">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
                </svg>
              </div>
            </div>
          </a>
    
        </div>
    </section>

</body>
</html>
